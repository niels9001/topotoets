<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TopoToets – Zeeland, Noord-Brabant &amp; Limburg</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: #f0f4f8;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem;
      color: #1e293b;
      overflow: hidden;
      position: fixed;
      width: 100%;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 960px;
      margin-bottom: 0.5rem;
      flex-shrink: 0;
    }

    .top-bar-left {
      display: flex;
      align-items: baseline;
      gap: 0.6rem;
    }

    h1 { font-size: 1.4rem; }
    .subtitle { font-size: 0.9rem; color: #64748b; }

    .top-bar-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .container {
      display: flex;
      gap: 2rem;
      max-width: 960px;
      width: 100%;
      align-items: stretch;
      flex: 1;
      min-height: 0;
    }

    /* ── Kaart ─────────────────────────────── */
    .map-area {
      flex: 1.3;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      min-height: 0;
    }

    #map {
      width: 100%;
      height: 100%;
      cursor: default !important;
    }

    .leaflet-grab { cursor: default !important; }
    .leaflet-dragging .leaflet-grab { cursor: default !important; }

    .leaflet-control-attribution { font-size: 10px; opacity: 0.6; }

    .matched-tooltip {
      background: #166534;
      border: none;
      color: #fff;
      font-weight: 600;
      font-size: 12px;
      padding: 3px 8px;
      border-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }
    .matched-tooltip::before {
      border-top-color: #166534 !important;
    }

    .province-overlay {
      font-size: 13px;
      font-weight: 700;
      color: #94a3b8;
      white-space: nowrap;
      pointer-events: none;
      text-shadow: 1px 1px 2px #fff;
    }

    /* ── Zijbalk ──────────────────────────── */
    .sidebar {
      flex: 0.7;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      min-height: 0;
      max-height: 100%;
    }

    .sidebar h2 { font-size: 1.2rem; color: #475569; }

    .scroll-area {
      overflow-y: auto;
      flex: 1;
      min-height: 0;
      -webkit-overflow-scrolling: touch;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .city-list {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .city-btn {
      padding: 0.25rem 0.7rem;
      font-size: 0.9rem;
      border: 1.5px solid #cbd5e1;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      text-align: left;
    }

    .city-btn:hover:not(.matched) {
      border-color: #3b82f6;
      background: #eff6ff;
    }

    .city-btn.matched {
      background: #22c55e;
      border-color: #16a34a;
      color: #fff;
      cursor: default;
      text-decoration: line-through;
    }

    .city-btn.wrong {
      animation: shake 0.45s;
      border-color: #ef4444;
      background: #fef2f2;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-6px); }
      80% { transform: translateX(6px); }
    }

    /* ── Score & hint ─────────────────────── */
    .score { font-size: 1rem; font-weight: 700; color: #334155; white-space: nowrap; }

    .reset-btn {
      padding: 0.4rem 0.8rem;
      font-size: 0.85rem;
      border: 2px solid #94a3b8;
      border-radius: 8px;
      background: #f8fafc;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .reset-btn:hover { background: #e2e8f0; border-color: #64748b; }

    .hint { font-size: 0.95rem; color: #64748b; min-height: 1.4rem; padding: 0.5rem 0; }
    .hint.correct { color: #16a34a; font-weight: 600; }
    .hint.wrong { color: #dc2626; font-weight: 600; }

    /* ── Feest! ────────────────────────────── */
    .celebration {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
    }

    .celebration.hidden { display: none; }

    .celebration-card {
      background: #fff; border-radius: 16px; padding: 2.5rem;
      text-align: center; box-shadow: 0 8px 30px rgba(0,0,0,0.2);
      animation: pop-in 0.4s ease-out;
    }

    .celebration-card h2 { font-size: 2rem; margin-bottom: 0.5rem; }
    .celebration-card p { font-size: 1.1rem; color: #475569; margin-bottom: 1.5rem; }
    .celebration-card .stars { font-size: 2.5rem; margin-bottom: 1rem; }

    .celebration-card button {
      padding: 0.7rem 1.5rem; font-size: 1.1rem; border: none; border-radius: 8px;
      background: #3b82f6; color: #fff; cursor: pointer; font-family: inherit;
      transition: background 0.2s;
    }

    .celebration-card button:hover { background: #2563eb; }

    @keyframes pop-in {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .schiphol-icon {
      font-size: 22px;
      line-height: 1;
      filter: drop-shadow(1px 1px 1px rgba(0,0,0,0.3));
      pointer-events: none !important;
    }

    /* ── Responsive ────────────────────────── */
    @media (max-width: 700px) {
      body { padding: 0.5rem; }
      .top-bar { flex-wrap: wrap; gap: 0.3rem; }
      .container { flex-direction: column; gap: 0.5rem; }
      .map-area { width: 100%; flex: none; height: 40vh; }
      #map { height: 100%; }
      .sidebar { width: 100%; flex: 1; min-height: 0; }
      h1 { font-size: 1.2rem; }
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <div class="top-bar-left">
      <h1>🗺️ TopoToets</h1>
      <span class="subtitle">Groep 6 van de Harlekijn</span>
    </div>
    <div class="top-bar-right">
      <span class="score" id="score">Score: 0 / 19</span>
      <button class="reset-btn" onclick="resetGame()">🔄 Opnieuw</button>
    </div>
  </div>

  <div class="container">
    <div class="map-area">
      <div id="map"></div>
    </div>

    <div class="sidebar">
      <p class="hint" id="hint">Klik op een stip op de kaart!</p>

      <div class="scroll-area">
        <h2>Steden</h2>
        <div class="city-list" id="cityList"></div>

        <h2>Wateren en overig</h2>
        <div class="city-list" id="waterList"></div>
      </div>
    </div>
  </div>

  <div class="celebration hidden" id="celebration">
    <div class="celebration-card">
      <div class="stars" id="stars"></div>
      <h2>🎉 Gefeliciteerd!</h2>
      <p id="resultText"></p>
      <button onclick="resetGame()">Nog een keer!</button>
    </div>
  </div>

  <script src="provinces.js?v=2"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // ── Kaart ──────────────────────────────
    const leafletMap = L.map('map', {
      zoomControl: false,
      dragging: true,
      scrollWheelZoom: true,
      doubleClickZoom: false,
      boxZoom: false,
      keyboard: false,
      touchZoom: true,
      minZoom: 7,
      maxZoom: 12,
    });

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
      maxZoom: 19,
    }).addTo(leafletMap);

    leafletMap.fitBounds([[50.70, 3.30], [51.85, 6.25]]);

    // Zet huidige zoom als minimum (niet uitzoomen) en +1 als max
    const startZoom = leafletMap.getZoom();
    leafletMap.setMinZoom(startZoom);
    leafletMap.setMaxZoom(startZoom + 1);

    // ── Provinciegrenzen (PDOK CBS data) ─────
    L.geoJSON(PROVINCE_GEOJSON, {
      style: {
        color: '#94a3b8',
        weight: 2,
        fillColor: '#cbd5e1',
        fillOpacity: 0.08,
      },
      interactive: false,
    }).addTo(leafletMap);

    // Provincienamen op de kaart
    [
      { text: 'Zeeland',       lat: 51.50, lng: 3.85 },
      { text: 'Noord-Brabant', lat: 51.65, lng: 5.10 },
      { text: 'Limburg',       lat: 51.25, lng: 5.95 },
    ].forEach(p => {
      L.marker([p.lat, p.lng], {
        icon: L.divIcon({ html: p.text, className: 'province-overlay', iconSize: null }),
        interactive: false,
      }).addTo(leafletMap);
    });

    // ── Steden ─────────────────────────────
    const cities = [
      // Zeeland
      { id: 'middelburg',    name: 'Middelburg',       lat: 51.4988, lng: 3.6109 },
      { id: 'vlissingen',    name: 'Vlissingen',       lat: 51.4426, lng: 3.5736 },
      { id: 'terneuzen',     name: 'Terneuzen',        lat: 51.3349, lng: 3.8285 },
      // Noord-Brabant
      { id: 'bergen-op-zoom', name: 'Bergen op Zoom',  lat: 51.4951, lng: 4.2870 },
      { id: 'roosendaal',    name: 'Roosendaal',       lat: 51.5305, lng: 4.4654 },
      { id: 'breda',         name: 'Breda',            lat: 51.5719, lng: 4.7683 },
      { id: 'tilburg',       name: 'Tilburg',          lat: 51.5555, lng: 5.0913 },
      { id: 'den-bosch',     name: "'s-Hertogenbosch", lat: 51.6978, lng: 5.3037 },
      { id: 'oss',           name: 'Oss',              lat: 51.7645, lng: 5.5179 },
      { id: 'eindhoven',     name: 'Eindhoven',        lat: 51.4416, lng: 5.4697 },
      { id: 'helmond',       name: 'Helmond',          lat: 51.4793, lng: 5.6612 },
      // Limburg
      { id: 'venlo',         name: 'Venlo',            lat: 51.3704, lng: 6.1724 },
      { id: 'roermond',      name: 'Roermond',         lat: 51.1942, lng: 5.9870 },
      { id: 'maastricht',    name: 'Maastricht',       lat: 50.8514, lng: 5.6900 },
      { id: 'heerlen',       name: 'Heerlen',          lat: 50.8882, lng: 5.9795 },
    ];

    // ── Wateren en overig ──────────────────
    const waters = [
      { id: 'oosterschelde',    name: 'Oosterschelde',     lat: 51.6000, lng: 3.9600 },
      { id: 'westerschelde',    name: 'Westerschelde',     lat: 51.3900, lng: 3.7500 },
      { id: 'zeeuws-vlaanderen', name: 'Zeeuws-Vlaanderen', lat: 51.3000, lng: 3.8500 },
      { id: 'vaalserberg',      name: 'Vaalserberg',       lat: 50.7536, lng: 6.0208 },
    ];

    const allItems = [...cities, ...waters];

    const STYLES = {
      normal:   { fillColor: '#3b82f6', color: '#2563eb', weight: 2, fillOpacity: 0.9 },
      selected: { fillColor: '#f59e0b', color: '#d97706', weight: 3, fillOpacity: 1   },
      matched:  { fillColor: '#22c55e', color: '#15803d', weight: 2, fillOpacity: 0.9 },
      wrong:    { fillColor: '#ef4444', color: '#dc2626', weight: 3, fillOpacity: 1   },
    };

    // ── Game state ─────────────────────────
    let markers = {};
    let selectedDot = null;
    let matchedSet = new Set();
    let mistakes = 0;

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function init() {
      // Oude markers verwijderen
      Object.values(markers).forEach(m => leafletMap.removeLayer(m));
      markers = {};

      // Stippen op de kaart
      allItems.forEach(city => {
        // Onzichtbare grotere cirkel voor touch
        const hitArea = L.circleMarker([city.lat, city.lng], {
          radius: 20,
          fillOpacity: 0,
          opacity: 0,
          interactive: true,
        }).addTo(leafletMap);
        hitArea.on('click', () => selectDot(city.id));

        const marker = L.circleMarker([city.lat, city.lng], {
          ...STYLES.normal,
          radius: 10,
        }).addTo(leafletMap);
        marker.on('click', () => selectDot(city.id));
        markers[city.id] = marker;
      });

      // Knoppen in de zijbalk (geschud, per groep)
      renderButtons('cityList', cities);
      renderButtons('waterList', waters);

      updateScore();
      setHint('Klik op een stip op de kaart!', '');
    }

    function renderButtons(listId, items) {
      const list = document.getElementById(listId);
      list.innerHTML = '';
      shuffle(items).forEach(city => {
        const btn = document.createElement('button');
        btn.className = 'city-btn';
        btn.textContent = city.name;
        btn.dataset.city = city.id;
        btn.addEventListener('click', () => checkMatch(city.id));
        list.appendChild(btn);
      });
    }

    function selectDot(cityId) {
      if (matchedSet.has(cityId)) return;

      // Vorige selectie resetten
      if (selectedDot && !matchedSet.has(selectedDot)) {
        markers[selectedDot].setStyle(STYLES.normal);
      }

      markers[cityId].setStyle(STYLES.selected);
      selectedDot = cityId;
      setHint('Welk antwoord hoort bij deze stip?', '');
    }

    function checkMatch(cityId) {
      if (matchedSet.has(cityId)) return;

      if (!selectedDot) {
        setHint('Klik eerst op een stip op de kaart!', 'wrong');
        return;
      }

      const btn = document.querySelector(`.city-btn[data-city="${cityId}"]`);

      if (cityId === selectedDot) {
        // Goed!
        matchedSet.add(cityId);
        markers[cityId].setStyle(STYLES.matched);

        const city = allItems.find(c => c.id === cityId);
        markers[cityId].bindTooltip(city.name, {
          permanent: true,
          direction: 'top',
          offset: [0, -11],
          className: 'matched-tooltip',
        });

        btn.classList.add('matched');
        selectedDot = null;
        updateScore();
        setHint('Goed zo! ✓', 'correct');

        if (matchedSet.size === allItems.length) {
          setTimeout(showCelebration, 600);
        }
      } else {
        // Fout!
        mistakes++;
        const current = selectedDot;
        markers[current].setStyle(STYLES.wrong);
        btn.classList.add('wrong');
        setHint('Helaas, probeer het nog eens!', 'wrong');

        setTimeout(() => {
          if (selectedDot === current && !matchedSet.has(current)) {
            markers[current].setStyle(STYLES.selected);
          }
          btn.classList.remove('wrong');
        }, 500);
      }
    }

    function updateScore() {
      document.getElementById('score').textContent =
        `Score: ${matchedSet.size} / ${allItems.length}`;
    }

    function setHint(text, type) {
      const hint = document.getElementById('hint');
      hint.textContent = text;
      hint.className = 'hint' + (type ? ' ' + type : '');
    }

    function showCelebration() {
      const el = document.getElementById('celebration');
      el.classList.remove('hidden');

      let starCount = mistakes === 0 ? 3 : mistakes <= 3 ? 2 : 1;
      document.getElementById('stars').textContent = '⭐'.repeat(starCount);

      const resultEl = document.getElementById('resultText');
      if (mistakes === 0) {
        resultEl.textContent = 'Wow, alles in één keer goed! 🏆';
      } else if (mistakes <= 3) {
        resultEl.textContent = `Heel goed! Maar ${mistakes} foutje${mistakes > 1 ? 's' : ''}.`;
      } else {
        resultEl.textContent = `Goed gedaan! Je had ${mistakes} foute pogingen.`;
      }
    }

    function resetGame() {
      document.getElementById('celebration').classList.add('hidden');
      selectedDot = null;
      matchedSet = new Set();
      mistakes = 0;
      init();
    }

    init();
  </script>
</body>
</html>
