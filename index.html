<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TopoToets – Noord- &amp; Zuid-Holland</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem;
      color: #1e293b;
    }

    h1 { font-size: 1.8rem; margin-bottom: 0.2rem; }
    .subtitle { font-size: 1rem; color: #64748b; margin-bottom: 1rem; }

    .container {
      display: flex;
      gap: 2rem;
      max-width: 960px;
      width: 100%;
      align-items: flex-start;
    }

    /* ── Kaart ─────────────────────────────── */
    .map-area {
      flex: 1.3;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    #map {
      width: 100%;
      height: 70vh;
      min-height: 420px;
      max-height: 680px;
    }

    .leaflet-control-attribution { font-size: 10px; opacity: 0.6; }

    .matched-tooltip {
      background: #166534;
      border: none;
      color: #fff;
      font-weight: 600;
      font-size: 12px;
      padding: 3px 8px;
      border-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }
    .matched-tooltip::before {
      border-top-color: #166534 !important;
    }

    .province-overlay {
      font-size: 13px;
      font-weight: 700;
      color: #94a3b8;
      white-space: nowrap;
      pointer-events: none;
      text-shadow: 1px 1px 2px #fff;
    }

    /* ── Zijbalk ──────────────────────────── */
    .sidebar {
      flex: 0.7;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    .sidebar h2 { font-size: 1.2rem; color: #475569; }

    .city-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .city-btn {
      padding: 0.7rem 1rem;
      font-size: 1.05rem;
      border: 2px solid #cbd5e1;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      text-align: left;
    }

    .city-btn:hover:not(.matched) {
      border-color: #3b82f6;
      background: #eff6ff;
    }

    .city-btn.matched {
      background: #22c55e;
      border-color: #16a34a;
      color: #fff;
      cursor: default;
      text-decoration: line-through;
    }

    .city-btn.wrong {
      animation: shake 0.45s;
      border-color: #ef4444;
      background: #fef2f2;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-6px); }
      80% { transform: translateX(6px); }
    }

    /* ── Score & hint ─────────────────────── */
    .score-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.5rem;
      padding: 0.6rem 0;
    }

    .score { font-size: 1.1rem; font-weight: 700; color: #334155; }

    .reset-btn {
      padding: 0.5rem 1rem;
      font-size: 0.95rem;
      border: 2px solid #94a3b8;
      border-radius: 8px;
      background: #f8fafc;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
    }

    .reset-btn:hover { background: #e2e8f0; border-color: #64748b; }

    .hint { font-size: 0.95rem; color: #64748b; min-height: 1.4rem; padding: 0.5rem 0; }
    .hint.correct { color: #16a34a; font-weight: 600; }
    .hint.wrong { color: #dc2626; font-weight: 600; }

    /* ── Feest! ────────────────────────────── */
    .celebration {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
    }

    .celebration.hidden { display: none; }

    .celebration-card {
      background: #fff; border-radius: 16px; padding: 2.5rem;
      text-align: center; box-shadow: 0 8px 30px rgba(0,0,0,0.2);
      animation: pop-in 0.4s ease-out;
    }

    .celebration-card h2 { font-size: 2rem; margin-bottom: 0.5rem; }
    .celebration-card p { font-size: 1.1rem; color: #475569; margin-bottom: 1.5rem; }
    .celebration-card .stars { font-size: 2.5rem; margin-bottom: 1rem; }

    .celebration-card button {
      padding: 0.7rem 1.5rem; font-size: 1.1rem; border: none; border-radius: 8px;
      background: #3b82f6; color: #fff; cursor: pointer; font-family: inherit;
      transition: background 0.2s;
    }

    .celebration-card button:hover { background: #2563eb; }

    @keyframes pop-in {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* ── Responsive ────────────────────────── */
    @media (max-width: 700px) {
      .container { flex-direction: column; gap: 1rem; }
      .map-area { width: 100%; }
      #map { height: 50vh; min-height: 300px; }
      .sidebar { width: 100%; }
      h1 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>
  <h1>🗺️ TopoToets</h1>
  <p class="subtitle">Noord- &amp; Zuid-Holland</p>

  <div class="container">
    <div class="map-area">
      <div id="map"></div>
    </div>

    <div class="sidebar">
      <h2>Steden</h2>
      <div class="city-list" id="cityList"></div>

      <div class="score-bar">
        <span class="score" id="score">Score: 0 / 15</span>
        <button class="reset-btn" onclick="resetGame()">🔄 Opnieuw</button>
      </div>

      <p class="hint" id="hint">Klik op een stip op de kaart!</p>
    </div>
  </div>

  <div class="celebration hidden" id="celebration">
    <div class="celebration-card">
      <div class="stars" id="stars"></div>
      <h2>🎉 Gefeliciteerd!</h2>
      <p id="resultText"></p>
      <button onclick="resetGame()">Nog een keer!</button>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // ── Kaart ──────────────────────────────
    const leafletMap = L.map('map', {
      zoomControl: false,
      dragging: false,
      scrollWheelZoom: false,
      doubleClickZoom: false,
      boxZoom: false,
      keyboard: false,
      touchZoom: false,
    });

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
      maxZoom: 19,
    }).addTo(leafletMap);

    leafletMap.fitBounds([[51.65, 3.35], [52.85, 5.65]]);

    // Provincienamen op de kaart
    [
      { text: 'Noord-Holland', lat: 52.55, lng: 4.75 },
      { text: 'Zuid-Holland',  lat: 52.00, lng: 4.45 },
    ].forEach(p => {
      L.marker([p.lat, p.lng], {
        icon: L.divIcon({ html: p.text, className: 'province-overlay', iconSize: null }),
        interactive: false,
      }).addTo(leafletMap);
    });

    // ── Steden ─────────────────────────────
    const cities = [
      // Noord-Holland
      { id: 'enkhuizen',   name: 'Enkhuizen',          lat: 52.7076, lng: 5.2953 },
      { id: 'alkmaar',     name: 'Alkmaar',             lat: 52.6324, lng: 4.7534 },
      { id: 'purmerend',   name: 'Purmerend',           lat: 52.5050, lng: 4.9597 },
      { id: 'zaandam',     name: 'Zaandam',             lat: 52.4388, lng: 4.8268 },
      { id: 'haarlem',     name: 'Haarlem',              lat: 52.3813, lng: 4.6369 },
      { id: 'amstelveen',  name: 'Amstelveen',          lat: 52.3014, lng: 4.8637 },
      { id: 'hilversum',   name: 'Hilversum',           lat: 52.2232, lng: 5.1763 },
      // Zuid-Holland
      { id: 'leiden',      name: 'Leiden',                lat: 52.1601, lng: 4.4970 },
      { id: 'alphen',      name: 'Alphen aan den Rijn', lat: 52.1287, lng: 4.6576 },
      { id: 'den-haag',    name: 'Den Haag',            lat: 52.0705, lng: 4.3007 },
      { id: 'zoetermeer',  name: 'Zoetermeer',          lat: 52.0571, lng: 4.4931 },
      { id: 'delft',       name: 'Delft',                lat: 52.0116, lng: 4.3571 },
      { id: 'gouda',       name: 'Gouda',                lat: 52.0115, lng: 4.7105 },
      { id: 'rotterdam',   name: 'Rotterdam',           lat: 51.9225, lng: 4.4792 },
      { id: 'dordrecht',   name: 'Dordrecht',           lat: 51.8133, lng: 4.6901 },
    ];

    const STYLES = {
      normal:   { fillColor: '#3b82f6', color: '#2563eb', weight: 2, fillOpacity: 0.9 },
      selected: { fillColor: '#f59e0b', color: '#d97706', weight: 3, fillOpacity: 1   },
      matched:  { fillColor: '#22c55e', color: '#15803d', weight: 2, fillOpacity: 0.9 },
      wrong:    { fillColor: '#ef4444', color: '#dc2626', weight: 3, fillOpacity: 1   },
    };

    // ── Game state ─────────────────────────
    let markers = {};
    let selectedDot = null;
    let matchedSet = new Set();
    let mistakes = 0;

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function init() {
      // Oude markers verwijderen
      Object.values(markers).forEach(m => leafletMap.removeLayer(m));
      markers = {};

      // Stippen op de kaart
      cities.forEach(city => {
        const marker = L.circleMarker([city.lat, city.lng], {
          ...STYLES.normal,
          radius: 12,
        }).addTo(leafletMap);
        marker.on('click', () => selectDot(city.id));
        markers[city.id] = marker;
      });

      // Knoppen in de zijbalk (geschud)
      const list = document.getElementById('cityList');
      list.innerHTML = '';
      shuffle(cities).forEach(city => {
        const btn = document.createElement('button');
        btn.className = 'city-btn';
        btn.textContent = city.name;
        btn.dataset.city = city.id;
        btn.addEventListener('click', () => checkMatch(city.id));
        list.appendChild(btn);
      });

      updateScore();
      setHint('Klik op een stip op de kaart!', '');
    }

    function selectDot(cityId) {
      if (matchedSet.has(cityId)) return;

      // Vorige selectie resetten
      if (selectedDot && !matchedSet.has(selectedDot)) {
        markers[selectedDot].setStyle(STYLES.normal);
      }

      markers[cityId].setStyle(STYLES.selected);
      selectedDot = cityId;
      setHint('Welke stad hoort bij deze stip?', '');
    }

    function checkMatch(cityId) {
      if (matchedSet.has(cityId)) return;

      if (!selectedDot) {
        setHint('Klik eerst op een stip op de kaart!', 'wrong');
        return;
      }

      const btn = document.querySelector(`.city-btn[data-city="${cityId}"]`);

      if (cityId === selectedDot) {
        // Goed!
        matchedSet.add(cityId);
        markers[cityId].setStyle(STYLES.matched);

        const city = cities.find(c => c.id === cityId);
        markers[cityId].bindTooltip(city.name, {
          permanent: true,
          direction: 'top',
          offset: [0, -14],
          className: 'matched-tooltip',
        });

        btn.classList.add('matched');
        selectedDot = null;
        updateScore();
        setHint('Goed zo! ✓', 'correct');

        if (matchedSet.size === cities.length) {
          setTimeout(showCelebration, 600);
        }
      } else {
        // Fout!
        mistakes++;
        const current = selectedDot;
        markers[current].setStyle(STYLES.wrong);
        btn.classList.add('wrong');
        setHint('Helaas, probeer het nog eens!', 'wrong');

        setTimeout(() => {
          if (selectedDot === current && !matchedSet.has(current)) {
            markers[current].setStyle(STYLES.selected);
          }
          btn.classList.remove('wrong');
        }, 500);
      }
    }

    function updateScore() {
      document.getElementById('score').textContent =
        `Score: ${matchedSet.size} / ${cities.length}`;
    }

    function setHint(text, type) {
      const hint = document.getElementById('hint');
      hint.textContent = text;
      hint.className = 'hint' + (type ? ' ' + type : '');
    }

    function showCelebration() {
      const el = document.getElementById('celebration');
      el.classList.remove('hidden');

      let starCount = mistakes === 0 ? 3 : mistakes <= 3 ? 2 : 1;
      document.getElementById('stars').textContent = '⭐'.repeat(starCount);

      const resultEl = document.getElementById('resultText');
      if (mistakes === 0) {
        resultEl.textContent = 'Wow, alles in één keer goed! 🏆';
      } else if (mistakes <= 3) {
        resultEl.textContent = `Heel goed! Maar ${mistakes} foutje${mistakes > 1 ? 's' : ''}.`;
      } else {
        resultEl.textContent = `Goed gedaan! Je had ${mistakes} foute pogingen.`;
      }
    }

    function resetGame() {
      document.getElementById('celebration').classList.add('hidden');
      selectedDot = null;
      matchedSet = new Set();
      mistakes = 0;
      init();
    }

    init();
  </script>
</body>
</html>
